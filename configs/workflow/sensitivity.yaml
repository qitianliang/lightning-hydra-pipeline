# configs/workflow/sensitivity.yaml
# Sensitivity workflow config - loaded by `bash scripts/workflow.sh sensitivity <sweep_id>`.
# Inherits workflow/mnist.yaml and defines default sensitivity studies.

# Usage:
#   bash scripts/workflow.sh sensitivity <sweep_id>
#   bash scripts/workflow.sh sensitivity <sweep_id> "workflow=mnist_full"
#   python src/workflow.py workflow=sensitivity workflow.target_sweep_id=<ID>

defaults:
  - mnist

task_name: sensitivity
target_sweep_id: null

sensitivity_task:
  eval_rank: 1
  mode: "rerun"
  optimized_metric: "val/acc_best"
  wait_for_sweep_finish: true
  wait_interval_seconds: 15
  timeout_secs: 600
  num_seeds: 3
  seed_start: 42
  test_metrics:
    - "test/acc"
    - "test/loss"
  primary_metric: "test/acc"
  report_path: "logs/final_reports/sensitivity_{sweep_id}.json"

  sensitivities:
    - name: "width_sensitivity"
      param_grid:
        model.net.lin1_size: [32, 64, 128]
        model.net.lin2_size: [32, 64, 128]
      axis_labels:
        model.net.lin1_size: "First Layer Size"
        model.net.lin2_size: "Second Layer Size"

    - name: "lr_sensitivity"
      param_grid:
        model.optimizer.lr: [0.0001, 0.001, 0.01]
      axis_labels:
        model.optimizer.lr: "Learning Rate"

  # Legacy single-study param_grid. Used only when sensitivities is empty.
  param_grid: {}

  axis_labels:
    model.optimizer.lr: "Learning Rate"
    model.net.lin1_size: "First Layer Size"
    model.net.lin2_size: "Second Layer Size"
    model.net.lin3_size: "Third Layer Size"
    data.batch_size: "Batch Size"

  figure_width: 3.5
  figure_dpi: 300
