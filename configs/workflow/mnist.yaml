# task_name controls the workflow entry mode:
#   pipeline (default) = optional sweep -> pipeline_tasks in order
#   sweep              = create sweep + wait, no downstream analysis
#   ablation           = reuse target_sweep_id and run ablation_task
#   sensitivity        = reuse target_sweep_id and run sensitivity_task
task_name: pipeline

# Set to a past sweep_id to skip hyperparameter search and reuse results.
#   CLI: python src/workflow.py workflow.target_sweep_id=wxsxa50o
target_sweep_id: null

# dry_run=true prints commands without executing anything.
dry_run: false

# W&B project where all sweeps and runs are stored.
wandb:
  entity: "qitianliang"
  project: "mnist"
  name: "base"

# General paths and session naming
general:
  status_dir: "logs/sweeps"
  latest_status_file: "${.status_dir}/${..wandb.entity}-${..wandb.project}-${..wandb.name}-latest.yaml"
  tmux_session_name: "mnist_workflow"

# Email notification (SMTP credentials from .env)
notification:
  enabled: true
  smtp:
    host: ${oc.env:SMTP_HOST}
    port: 465
    use_ssl: true
    username: ${oc.env:SMTP_EMAIL_ADDRESS}
    password: ${oc.env:SMTP_PASSWORD}
  recipient_email: ${oc.env:USER_EMAIL_ADDRESS}

# Global devices config (override via CLI: workflow.devices=[0,1,2])
devices: [0]

# Sweep configuration - defines the hyperparameter search
sweep_task:
  conda_env: "${oc.env:PYENV}"
  config_path: "configs/sweep/mnist_sweep.yaml"
  agent_max_initial_failures: 5
  # Grid search combination limit, prevents accidental huge fanout.
  max_grid_combinations: 100

# Evaluation configuration - retrain best params with N seeds
evaluate_task:
  target_sweep_id:
  # rerun = delete old eval runs + recreate; resume = use existing
  mode: "rerun"
  optimized_metric: "val/acc_best"
  top_n: 2
  wait_for_sweep_finish: true
  wait_interval_seconds: 15
  timeout_secs: 3600
  num_seeds: 5
  seed_start: 42
  run_command:
    base_args:
      - "python"
      - "src/train.py"
      - "experiment=example"
      - "trainer=gpu"
      - "logger.wandb.project=${workflow.wandb.project}"
  test_metrics:
    - "test/acc"
    - "test/loss"
  report_path: "logs/final_reports/optimized_results_{sweep_id}.json"
  # Baseline comparison (optional, null = skip)
  baseline:
    enabled: false
    metric: "test/acc"
    value: 0.95

# Ablation task configuration (used by task_name=ablation or pipeline type=ablation)
ablation_task:
  # eval_rank belongs here: ablation selects rank-N sweep params independently.
  eval_rank: 1
  mode: "rerun"
  optimized_metric: "val/acc_best"
  wait_for_sweep_finish: true
  wait_interval_seconds: 15
  timeout_secs: 600
  parallel: true
  num_seeds: 3
  seed_start: 42
  test_metrics:
    - "test/acc"
    - "test/loss"
  report_path: "logs/final_reports/ablation_{sweep_id}"
  components: []

# Sensitivity task configuration (used by task_name=sensitivity or pipeline type=sensitivity)
sensitivity_task:
  # eval_rank belongs here: sensitivity selects rank-N sweep params independently.
  eval_rank: 1
  mode: "rerun"
  optimized_metric: "val/acc_best"
  wait_for_sweep_finish: true
  wait_interval_seconds: 15
  timeout_secs: 600
  num_seeds: 3
  seed_start: 42
  test_metrics:
    - "test/acc"
    - "test/loss"
  primary_metric: "test/acc"
  report_path: "logs/final_reports/sensitivity_{sweep_id}.json"
  # New format: list of studies. Preferred over legacy param_grid.
  sensitivities: []
  # Legacy single-study param_grid. Used only when sensitivities is empty.
  param_grid: {}
  axis_labels:
    optimizer.lr: "Learning Rate"
    model.net.lin1_size: "First Layer Size"
    model.net.lin2_size: "Second Layer Size"
    data.batch_size: "Batch Size"
  figure_width: 3.5
  figure_dpi: 300

# Code snapshot configuration.
# Source code is published once per sweep id as a W&B artifact. Later evaluate/
# ablation/sensitivity runs fetch that frozen source into /tmp sandboxes.
snapshot:
  enabled: true
  # Safety: do not overwrite code_sweep_<sweep_id> by default. Reusing a sweep id
  # after local code changes must keep using the original frozen source.
  allow_source_overwrite: false
  # Old code artifacts may miss newly added runtime configs; allow host fallback only
  # for legacy artifacts with no source_manifest.json.
  legacy_config_fallbacks: true

# pipeline_tasks: stages run in sequence after sweep (or when target_sweep_id is set)
# Supported types:
#   evaluate    - retrain best sweep params with N seeds, aggregate metrics
#   ablation    - component ablations using ablation_task
#   sensitivity - 1D/2D sensitivity studies using sensitivity_task
pipeline_tasks:
  - name: "Full_Model"
    type: "evaluate"

  # - name: "ablation_study"
  #   type: "ablation"

  # - name: "sensitivity_lr"
  #   type: "sensitivity"
