  #     model.net.lin1_size: [64, 128, 256]
  #     model.net.lin2_size: [128, 256]

  # Ablation mode (standalone): auto-fetches evaluate results, compares all components
  # - name: "ablation_study"
  #   type: "ablation"

  # Sensitivity mode (standalone): 1D/2D grid with paper-style plots + PDF
