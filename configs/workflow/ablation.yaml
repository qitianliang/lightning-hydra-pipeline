# configs/workflow/ablation.yaml
# Ablation workflow config - loaded by `bash scripts/workflow.sh ablation <sweep_id>`.
# Inherits workflow/mnist.yaml and defines the default component set.

# Usage:
#   bash scripts/workflow.sh ablation <sweep_id>
#   bash scripts/workflow.sh ablation <sweep_id> "workflow=mnist_full"
#   python src/workflow.py workflow=ablation workflow.target_sweep_id=<ID>

defaults:
  - mnist

task_name: ablation
target_sweep_id: null

ablation_task:
  eval_rank: 1
  mode: "rerun"
  optimized_metric: "val/acc_best"
  wait_for_sweep_finish: true
  wait_interval_seconds: 15
  timeout_secs: 600
  parallel: true
  num_seeds: 3
  seed_start: 42
  test_metrics:
    - "test/acc"
    - "test/loss"
  report_path: "logs/final_reports/ablation_{sweep_id}"

  components:
    - name: "no_lin1_bn"
      overrides:
        model.net.lin1_size: 32
    - name: "no_lin2_bn"
      overrides:
        model.net.lin2_size: 32
