# configs/workflow/mnist_full.yaml
# Full experiment workflow config - no debug limits.
# Usage:
#   bash scripts/workflow.sh pipeline "" "workflow=mnist_full"
#   bash scripts/workflow.sh ablation <SWEEP_ID> "workflow=mnist_full"
#   bash scripts/workflow.sh sensitivity <SWEEP_ID> "workflow=mnist_full"
#
# Differences from workflow/mnist.yaml:
#   - sweep_task.config_path -> mnist_sweep_full.yaml
#   - evaluate_task.run_command.base_args -> experiment=mnist_full
#   - evaluate/ablation/sensitivity num_seeds -> 5

defaults:
  - mnist

sweep_task:
  config_path: "configs/sweep/mnist_sweep_full.yaml"

evaluate_task:
  run_command:
    base_args:
      - "python"
      - "src/train.py"
      - "experiment=mnist_full"
      - "trainer=gpu"
      - "logger.wandb.project=${workflow.wandb.project}"
  num_seeds: 5
  top_n: 2

ablation_task:
  num_seeds: 5

sensitivity_task:
  num_seeds: 5
