# configs/sweep/mnist_sweep_full.yaml
# 正式实验 sweep 配置 — 充分探索超参空间
# Usage: 通过 workflow=mnist_full 自动加载，或手动指定:
#   python src/workflow.py workflow=mnist_full
#
# 与 mnist_sweep.yaml 的区别:
#   - run_cap: 20 (vs 4) — 充分探索
#   - early_terminate.min_iter: 1 (vs 3) — 更晚终止
#   - experiment=mnist_full (vs example) — 完整训练

program: src/train.py
name: base
description: MNIST sweep (full)
project: mnist
method: bayes
metric:
  goal: maximize
  name: val/acc_best
parameters:
  model.optimizer.lr:
    min: 0.0001
    max: 0.1
    distribution: log_uniform_values
  data.batch_size:
    values: [32, 64, 128]

early_terminate:
  type: hyperband
  min_iter: 1

run_cap: 20

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args_no_hyphens}
  - experiment=mnist_full
  - trainer=gpu